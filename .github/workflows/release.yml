name: Release binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: darwin
            arch: arm64
          - runner: ubuntu-24.04
            platform: linux
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected:
              raise SystemExit(f"release tag must be {expected}, got {os.environ['RELEASE_TAG']}")
          PY
      - run: uv sync --locked --group freeze
      - run: ./scripts/build-release.sh release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rhizome-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release
          sha256sum rhizome-* > SHA256SUMS
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${RELEASE_TAG}" release/* --verify-tag --generate-notes --repo "${GITHUB_REPOSITORY}"
          fi
