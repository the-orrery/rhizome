[project]
name = "rhizome"
version = "0.1.0"
description = "Rhizome — decentralized KB authoring and validation CLI (frontmatter contract + domain tree)"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Eridanus" }]
requires-python = ">=3.11"
dependencies = []

[project.scripts]
rhizome = "kb.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kb"]

[tool.pytest.ini_options]
pythonpath = ["src"]
